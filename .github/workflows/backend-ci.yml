name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: LegalLinkBackend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: LegalLinkBackend

    - name: Run Tests
      run: npm test
      working-directory: LegalLinkBackend
      env:
        JWT_SECRET: testsecretkey
        MONGO_URI: mongodb://localhost:27017/legallink-test
